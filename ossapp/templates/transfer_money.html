<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Money</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Transfer Money</h1>
        <table class="table table-striped mt-4">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Collected Money</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for delivery_person in delivery_persons %}
                    <tr>
                        <td>{{ delivery_person.first_name }}</td>
                        <td>₹{{ delivery_person.collected_money }}</td>
                        <td>
                            <form action="{% url 'transfer_money' %}" method="post">
                                {% csrf_token %}
                                <input type="email" name="email" value="{{ delivery_person.email }}" hidden >
                                <input type="submit" class="btn btn-primary" value="collect money">
                            </form>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="{% url 'ownerdashboard' %}" class="btn btn-primary">Home</a>
    </div>
    
    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
